            html, body {

            #loadingScreen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100%;
                
                background-color: #f3f6ff; 
                
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
                opacity: 1;
                visibility: visible;
                
                transition: opacity 1s ease-out; /* ◄ QUICKER: Dropped from 4s to 1s for a snappier fade */
            }

            /* Adjusts the Lottie container to comfortably fill the viewport or scale cleanly */
            #lottieLoader {
                width: 100%;
                height: 100%;
                max-width: 250px; /* Limits size on ultra-wide desktop monitors so it doesn't get massive */
                max-height: 250px;
                margin: 0 auto;
            }

            #loadingScreen.fade-out {
                opacity: 0;
            }
 
            #dpbig {
                width: 100%;
                max-width: 440px; 
                max-height: 45vh; /* Prevents image from hogging space on cramped mobile viewports */
                object-fit: contain;
                z-index: 10;
                transform: rotate(0deg) scale(1);
                transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1), filter 0.3s ease;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
                margin-bottom: 0px; /* Comfortable layout gap between image and nav list */
            }
            
            #dpbig:hover {
        transform: rotate(180deg); 
        filter: hue-rotate(90deg) contrast(1.5);
}
            #dpbig:active {
        transform: scale(0.92) rotate(-15deg);
        filter: grayscale(1) contrast(5) brightness(0.8); 
        transition: transform 0.05s ease;
}
            
            #dismiss-btn {
    /* 1. Color and Typography */

    font-weight: bold;
    
    /* 2. Strip default button styling */
    background: none; 
    border: none;
    padding: 0 5px;             /* Resets padding and adds a tiny bit of breathing room */
    
    /* 3. Positioning and UX */
    float: right;               /* Pushes the button to the far right of the banner */
    cursor: pointer;            /* Changes mouse to a hand pointer on desktop */
    line-height: 1;             /* Prevents the 'X' from pushing the banner height down */
}

/* Optional: Smooth color change when a user hovers over it */
#dismiss-btn:hover {
    color: #e31982;             /* Turns pink on hover (matching your border color) */
}
                        
            /* UPDATED PINK TEXT-ONLY MENU STYLING */
            nav {
                z-index: 100;
                width: 100%;
                max-width: 1200px;

                top: 40px;          /* ◄ INCREASE this number to push the menu DOWN on desktop */
                                    /* DECREASE this number (e.g. 0px) to pull it UP */

            nav ul {
                list-style-type: none; /* No bullets */
                padding: 0;
                margin: 0;
                display: flex; /* Forces the list items into a row */
                flex-direction: row; /* Double-ensures they stay side-by-side */
                justify-content: center; /* Centers the whole row */
                gap: 26px; /* Adds space between your long sentences so they don't smash together */
            }

            nav li a {
                display: block;
                color: #e31982; /* Fallback baseline color */
                font-family: "Xolonium", sans-serif;
                font-size: 18px; 
                text-decoration: none; 
                font-weight: bold;
                white-space: nowrap; /* CRITICAL: This forces each sentence to stay on ONE single line */
                transition: transform 0.2s ease, opacity 0.2s ease;
            }

            /* UNIQUE COLORS FOR EACH MENU ITEM */
            nav ul li:nth-child(1) a { color: #22252a; } 
            nav ul li:nth-child(2) a { color: #00ce01; } 
            nav ul li:nth-child(3) a { color: #ff4500; } 
            nav ul li:nth-child(4) a { color: #0291fc; } 
            nav ul li:nth-child(5) a { color: #ff5094; }

            nav li a:hover {
                opacity: 1; /* Makes it slightly transparent on hover */
                transform: scale(0.7); /* Slight pop/grow animation when hovered */
            }   
            
            @media screen and (max-width: 768px) {
                #dpbig {
                    max-width: 242px; 
                    margin-bottom: 132px;
                    flex-shrink: 0; 
                }
                
                nav {
                    position: relative; 
                    top: 0px;          /* ◄ Keeps mobile overrides separate from desktop layout shifts */
                }

                nav ul {
                    display: flex;
                    flex-direction: column; 
                    align-items: center;
                    gap: 33px;              
                }

                nav li a {
                    font-size: 13px; 
                    white-space: normal;

                }

            /* LANDSCAPE MOBILE SAFEGUARDS */
            @media screen and (max-height: 450px) {

                }
                nav ul {
                    flex-direction: row; 
                    gap: 12px;
                }
                nav li a {
                    font-size: 11px;

        <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.1/lottie.min.js"></script>

<script>

    if (window.location.pathname.endsWith('/index.html')) {
        window.location.replace(window.location.href.replace('/index.html', '/'));
    }
    
    // 1. Store your 3 different JSON file paths in a list
    const loadingAnimations = [
        'guysloading.json',
        'hamload.json',
        'yellowloading.json',
        'frogloading.json'
    ];

    // 2. Pick a random animation file from the list
    const randomChoice = Math.floor(Math.random() * loadingAnimations.length);
    const chosenAnimationPath = loadingAnimations[randomChoice];

    // 3. Initialize the Lottie animation loop using the random selection
    var animation = lottie.loadAnimation({
        container: document.getElementById('lottieLoader'), 
        renderer: 'svg',                                    
        loop: true,                                         
        autoplay: true,                                     
        path: chosenAnimationPath
    });
    
    // Fading out the loader
    const loadingScreen = document.getElementById("loadingScreen");

    setTimeout(() => {
        loadingScreen.classList.add("fade-out");

        // Remove the loading screen from the DOM after transition ends
        setTimeout(() => {
            loadingScreen.remove(); 
        }, 500); 
    }, 2300); 
                
</script>
