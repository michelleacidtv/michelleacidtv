            @font-face {

            html, body {
                background-color: #fefff0;

                margin: 0;

            #loadingScreen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100%;
                
                background-color: #fefff0; 
                
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
                opacity: 1;
                visibility: visible;
                
                transition: opacity 1s ease-out; /* ◄ QUICKER: Dropped from 4s to 1s for a snappier fade */
            }

            /* Adjusts the Lottie container to comfortably fill the viewport or scale cleanly */
            #lottieLoader {
                width: 100%;
                height: 100%;
                max-width: 250px; /* Limits size on ultra-wide desktop monitors so it doesn't get massive */
                max-height: 250px;
                margin: 0 auto;
            }

            #loadingScreen.fade-out {
                opacity: 0;
            }
 
            #dpbig {
                position: absolute;
                width: 440px; /* Keeps your original CD size */
                
                /* 1. Dead center it vertically and horizontally */
                top: 42%;
                left: 50%;
                transform: translate(-50%, -50%);
                
                /* 2. Layering setup */
                z-index: 10; /* Ensures it sits underneath your loading screen but above the background */
                
                transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1), filter 0.3s ease;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }
            
            #dpbig:hover {
    /* Slowly spins 180 degrees and keeps its true centering intact */
    transform: translate(-50%, -50%) rotate(180deg); 
    /* Inverts the colors slightly and adds high digital contrast */
    filter: hue-rotate(90deg) contrast(1.5); 
}
            #dpbig:active {
    transform: translate(-50%, -50%) scale(0.92) rotate(-15deg);
    filter: grayscale(1) contrast(5) brightness(0.8); /* Inverts colors completely to pure negative on press */
    transition: transform 0.05s ease; /* Lightning fast speed so it feels crisp */
}

            @media (max-width: 768px) {
                #dpbig {
                    width: 240px; /* Scales down smoothly for mobile vertical viewports */
                    top: 29%;     /* Locks it to the dead center vertically */
                    left: 50%;    /* Locks it to the dead center horizontally */
                    transform: translate(-50%, -50%); /* Keeps it anchored to the true center point */
                }
            }

            @media screen and (max-width: 844px) and (orientation: landscape) {
                #dpbig {
                    width: 280px; /* Scales down cleanly so it doesn't clip off the top/bottom on wide mobile screens */
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                }
                
            }

            #mobile-warning {
                display: none; /* CRITICAL: Hides the warning on desktop by default */
                position: fixed;
                top: 10px;
                width: 43%;
                background-color: rgba(227, 25, 130, 0.35);
                color: #ffffff;
                text-align: center;
                padding: 4px;
                font-size: 14px;
                z-index: 9999;
                border: 2px solid rgba(227, 25, 130, 0.55);
                border-radius: 8px;
            }
            
            #dismiss-btn {
    /* 1. Color and Typography */
    color: #ffffff;             /* Change this to whatever color you want the 'X' to be */
    font-size: 18px;            /* Makes the 'X' slightly larger and easier to tap */
    font-weight: bold;
    
    /* 2. Strip default button styling */
    background: none; 
    border: none;
    padding: 0 5px;             /* Resets padding and adds a tiny bit of breathing room */
    
    /* 3. Positioning and UX */
    float: right;               /* Pushes the button to the far right of the banner */
    cursor: pointer;            /* Changes mouse to a hand pointer on desktop */
    line-height: 1;             /* Prevents the 'X' from pushing the banner height down */
}

/* Optional: Smooth color change when a user hovers over it */
#dismiss-btn:hover {
    color: #e31982;             /* Turns pink on hover (matching your border color) */
}
                        
            /* UPDATED PINK TEXT-ONLY MENU STYLING */
            nav {

            nav li a {

            @media screen and (max-width: 768px) {

                }

                nav li a {
                    font-size: 16px;        
                }
            }

        <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.1/lottie.min.js"></script>

<script>

    if (window.location.pathname.endsWith('/index.html')) {
        window.location.replace(window.location.href.replace('/index.html', '/'));
    }
    
    // 1. Store your 3 different JSON file paths in a list
    const loadingAnimations = [
        'guysloading.json',
        'hamload.json',
        'yellowloading.json',
        'frogloading.json'
    ];

    // 2. Pick a random animation file from the list
    const randomChoice = Math.floor(Math.random() * loadingAnimations.length);
    const chosenAnimationPath = loadingAnimations[randomChoice];

    // 3. Initialize the Lottie animation loop using the random selection
    var animation = lottie.loadAnimation({
        container: document.getElementById('lottieLoader'), 
        renderer: 'svg',                                    
        loop: true,                                         
        autoplay: true,                                     
        path: chosenAnimationPath
    });
    
    // Fading out the loader
    const loadingScreen = document.getElementById("loadingScreen");

    setTimeout(() => {
        loadingScreen.classList.add("fade-out");

        // Remove the loading screen from the DOM after transition ends
        setTimeout(() => {
            loadingScreen.remove(); 
        }, 500); 
    }, 2300); 
                
    // Mobile Warning script
    document.addEventListener("DOMContentLoaded", () => {
        const warning = document.getElementById("mobile-warning");
        const dismissBtn = document.getElementById("dismiss-btn");

        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            warning.style.display = "block"; 
        }

        dismissBtn?.addEventListener("click", () => {
            warning.style.display = "none";
        });
    });
</script>
