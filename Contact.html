<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>call me</title>
    <link rel="canonical" href="https://www.michelleacid.tv/" />
    <link rel="icon" type="image/png" href="faviconnew.png">
    <link href="https://fonts.googleapis.com/css2?family=Xolonium&display=swap" rel="stylesheet" />
    
    <style>
        @font-face {
            font-family: 'Xolonium';
            src: url('Xolonium.woff2') format('woff2'),
                 url('Xolonium.woff') format('woff'),
                 url('Xolonium-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html, body {
            background-color: black;
            background-image: url(contactbackground.webp);
            background-size: cover;       /* Fills the screen */
            background-position: center;  /* Centers the image */
            color: #e31982;
            font-family: "Xolonium", sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Disables all scrolling */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: default;
        }

        .content-wrapper {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            width: 100%;
            height: 100%;
        }

        p.contact-info { 
            font-size: 2rem; 
            max-width: 600px; 
            line-height: 1; 
            position: absolute;
            top: 44%;
            z-index: 5;
            color: #3fe304;
        }

        .back-btn {
            position: fixed;   
            top: 20px;         
            left: 20px;        
            color: #e31982;
            border: 2px solid #e31982;
            border-radius: 30px;
            padding: 7px 9px;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            z-index: 200;
        }

        .back-btn:hover {
            background-color: #e31982;
            color: white;
        }
        
        /* CENTERED FORM LAYOUT */
        #contact-form {
            position: absolute;  
            left: 50%;
            top: 65%;           
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 50;
            width: 231px;
        }

        #contact-form label {
            font-size: 1rem;
        }

        #contact-form input {
            font-family: "Xolonium", sans-serif;
            padding: 4px;
            border: 2px solid #e31982;
            background: black;
            color: #7fff00;
            text-align: center;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        #contact-form button {
            font-family: "Xolonium", sans-serif;
            background-color: #e31982;
            color: black;
            border: none;
            padding: 6px 20px;
            font-weight: bold;
            cursor: help;
            border-radius: 4px;
            transition: 0.2s;
        }

        #contact-form button:hover {
            background-color: #3fe304;
            color: #e31982;
        }

        /* STATUS MESSAGE INSIDE THE FORM */
        #status-message {
            margin-top: -8px;
            color: #e2e304;       
            font-family: "Xolonium", sans-serif;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            white-space: nowrap; 
        }

        /* STABILIZED SMILE IMAGE */
        #smileimage2 {
            position: absolute;
            width: 468px; 
            left: 50%;
            top: 32%;  
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* Responsive scaling */
        @media (max-width: 768px) {
            #contact-form { width: 61vw; top: 68%; }
            #smileimage2 { width: 260px; top: 42%; }
            p.contact-info { font-size: 1.6rem; top: 50%; }
            #status-message { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <a href="index.html" class="back-btn">back</a>

        <p class="contact-info">
            michelleacidtv@gmail.com <br>
        </p>
        
        <!-- FIXED FORM WITH NESTED STATUS DIV -->
        <form id="contact-form">
            <label for="email">Enter E-mail for Updates:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Go</button>
            <div id="status-message"></div> 
        </form>

        <img id="smileimage2" src="bigsmilegif1NEW.png" alt="Smile2" class="Smile2" />
    </div>

    <!-- FIXED SCRIPT INCLUSIONS -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        document.getElementById("contact-form").addEventListener("submit", function(event) {
            event.preventDefault(); 

            const emailInput = document.getElementById("email");
            const statusMessage = document.getElementById("status-message");
            
            if (!emailInput || !statusMessage) return; 

            statusMessage.innerHTML = "Sending...";

            // Post request to Formspree
            axios.post('https://formspree.io/f/xovdvkjq', {
                email: emailInput.value
            })
            .then(function(response) {
                statusMessage.innerHTML = "꓄ꃅꍏꈤꀘꌗ. ꁅꂦ ꀤꈤ ꉣꍟꍏꉓꍟ";
                emailInput.value = ""; // Clear input box
            })
            .catch(function(error) {
                statusMessage.innerHTML = "Error. Try again.";
                console.error("Formspree Error Details:", error);
            });
        });
    </script>

</body>
</html>
