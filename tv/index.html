        /* The "Lockdown" CSS */
        html, body {
            background-color: black;
            color: #e31982;
            font-family: "Xolonium", sans-serif;
            margin: 0;
            padding: 0;
            
            /* Strict dimensions */
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Disables all scrolling */
            
            /* Centering everything */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            /* Background settings */
            background-image: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            cursor: default;

        }

        /* Container that ensures content stays inside the "window" */
        .content-wrapper {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; max-width: 600px; line-height: 1.4; }

        .back-btn {
            position: fixed;   /* Lock it to the screen */
            top: 20px;         /* 20 pixels down from the top */
            left: 20px;        /* 20 pixels in from the left */
            color: #e31982;
            border: 2px solid #e31982;
            border-radius: 30px;
            padding: 7px 9px;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #e31982;
            color: white;
            box-shadow: 0 0 0px #e31982;
        }
        
/* Base Desktop Style */
.click-text {
    position: absolute;
    bottom: 470px;
    left: 274px;
    margin: 0;
    color: #e31982;
    font-size: 0.7rem;
    z-index: 10;
}

/* Mobile Portrait (Phones) */
@media (max-width: 768px) {
    .click-text {
        position: fixed;      /* Lock it relative to the viewport glass */
        top: 103px;            /* Placed safely below the quote button (top 20px + button height) */
        right: 47px;          /* Aligned with the right edge side of the button area */
        left: auto;           /* Clears desktop positioning rules */
        transform: none;      
        
        /* Cleaned out the accidental layout block styles */
        width: auto;          /* Let the text span naturally across a single line */
        height: auto;         
        font-size: 0.65rem;   /* Crisp, readable subtitle size for mobile scales */
        text-align: right;    /* Keeps text cleanly flush with the right screen margin */
    }
}

/* Mobile Landscape (Horizontal Phones) */
@media screen and (max-width: 844px) and (orientation: landscape) {

        top: 56px;            /* Tighter fit under the landscape quote button */
        right: 15px;
        left: auto;
        transform: none;
        
        width: auto;
        height: auto;
        font-size: 0.6rem;
        text-align: right;
    }
}
        
              .tv-container {
            position: relative;
            width: 700px; /* Max desktop size */
            max-width: 90vw; /* Keeps it responsive if desktop window shrinks */
            text-align: center;
            margin: 0 auto;
        }

        /* TV Image */
        .tv-frame {
            width: 100%;
            display: block;
        }

        /* Video inside the TV */
        .tv-screen {
            position: absolute;
            top: 11%; /* Adjust to fit the TV screen */
            left: 12%; /* Adjust to fit the TV screen */
            width: 77%; /* Adjust based on the screen size in the image */
            height: 63%; /* Keep aspect ratio */
            aspect-ratio: 4 / 3; /* Ensures 4:3 ratio */
            object-fit: contain; /* Ensures it fills the screen properly */
            border-radius: 5px;
            background: black; /* Black bars instead of stretching */
        }
@media screen and (max-width: 768px) and (orientation: portrait) {
    .tv-container {
        width: 80vw;       /* Slightly reduced from 92vw to leave clean safety margins on the sides */

        bottom: auto;      /* Removes the massive -374% drop, snapping it back to the viewport center */
        margin: auto;      /* Instructs the browser to balance spacing equally on all sides */
    }
}

/* Mobile Landscape (Horizontal Phones) */
@media screen and (max-width: 844px) and (orientation: landscape) {
    .tv-container {
        width: 55vw;       /* Adjusted to fill a balanced portion of wide landscape screens */
        max-height: 75vh;  /* Prevents the TV from clipping off the top or bottom of short screens */
        left: auto;        /* Clears horizontal pixel drifting */
        bottom: auto;      /* Removes the massive -529% vertical offset */
        margin: auto;      /* Forces perfect horizontal and vertical centering */
    }
}

        /* CD Initial Position (Starts on the Right) */
        .cd {
            position: absolute;
            width: 90px; /* Adjust CD size */
            top: 7%;  /* Higher values move it down */
            right: -218px; /* Start off-screen on the right */
            transition: transform 1s linear, right 1.5s ease-in-out, top 1s ease-in-out, opacity 0.5s ease-in;
        }

        /* Move CD Left */
        .cd.move-left {
            right: 50%; /* Moves toward the TV */
        }

        /* Move CD Down */
        .cd.move-down {
            top: 65%; /* Moves it down near the TV slot */
        }

        /* Shrink and Disappear */
        .cd.insert {
            transform: scale(0.2); /* Shrinks to simulate insertion */
            opacity: 0; /* Fades out */
        }

    document.addEventListener("DOMContentLoaded", function () {
        const cd = document.querySelector(".cd");
        const buttonOrange = document.querySelector(".button.orange");
        const buttonTokyo = document.querySelector(".button.tokyo");
        const buttonWink = document.querySelector(".button.wink");
        const buttonYounme = document.querySelector(".button.younme");
        const buttonMechanical = document.querySelector(".button.mechanical");
        const videoOrange = document.getElementById("tv-video-orange");
        const videoTokyo = document.getElementById("tv-video-tokyo");
        const videoWink = document.getElementById("tv-video-wink");
        const videoYounme = document.getElementById("tv-video-younme");
        const videoMechanical = document.getElementById("tv-video-mechanical");
        const contactInfo = document.createElement("div");
            contactInfo.classList.add("contact-info");
            contactInfo.textContent = "michelleacidtv@gmail.com"; // Your contact details here
        
        const allVideos = [videoOrange, videoTokyo, videoWink, videoYounme, videoMechanical];

        // Function to stop all videos before playing a new one
        function stopAllVideos() {
            allVideos.forEach(video => {
                video.pause(); // Stop playing
                video.currentTime = 0; // Reset to beginning
                video.style.display = "none"; // Hide the video
                video.load();
            });
        }

        // Function to reset CD animation
        function resetCDAnimation() {
            cd.classList.remove("move-left", "move-down", "insert");
            void cd.offsetWidth; // Forces a reflow
        }

        // Function to trigger animation and play video
        function triggerAnimationAndPlayVideo(videoElement) {
            stopAllVideos();
            resetCDAnimation();
            // Start the CD animation sequence
            cd.classList.add("move-left");

            setTimeout(() => {
                cd.classList.add("move-down");
            }, 1500);

            setTimeout(() => {
                cd.classList.add("insert");
            }, 2500);

            // **Delay stopping videos to avoid blocking animation**
            setTimeout(() => {
                stopAllVideos(); // Now stop all videos
            }, 2800);

            // Show and play the video after the animation ends
            setTimeout(() => {
                videoElement.style.display = "block"; // Make the video visible
                videoElement.currentTime = 0; // Reset the video to start
                videoElement.play(); // Play the video
            }, 3500);
        }

        // Event listener for Orange button
        buttonOrange.addEventListener("click", function () {
            triggerAnimationAndPlayVideo(videoOrange);
        });

        // Event listener for Tokyo button
        buttonTokyo.addEventListener("click", function () {
            triggerAnimationAndPlayVideo(videoTokyo);
        });

        // Event listener for Wink button
        buttonWink.addEventListener("click", function () {
            triggerAnimationAndPlayVideo(videoWink);
        });

        // Event listener for Younme button
        buttonYounme.addEventListener("click", function () {
            triggerAnimationAndPlayVideo(videoYounme);
        });

        // Event listener for Mechanical button
        buttonMechanical.addEventListener("click", function () {
            triggerAnimationAndPlayVideo(videoMechanical);
        });

        // Fullscreen handling for both videos
        document.addEventListener("fullscreenchange", function () {
            const video = document.querySelector("video"); // Target the video dynamically

            if (document.fullscreenElement === video) {
                video.style.width = "100vw"; // Make video take full screen width
                video.style.height = "75vw"; // Ensures 4:3 (75vw = 100vw * 3/4)
                video.style.maxHeight = "100vh"; // Prevents overflow
            } else {
                video.style.width = ""; // Reset on exit
                video.style.height = "";
            }
        });
         // Quote & Hand Logic
    const quoteButton = document.querySelector(".button.quote");
    const handImage = document.getElementById("handImage");
    const quoteText = document.getElementById("quoteText");

    const quotes = [
        "You run faster when you see the end in sight",
        "Resist nothing",
        "Observe the mind.",
        "Confront what you are avoiding",
        "He who writes for fools always finds a large public",
        "All discipline begins in the body",
        "Nothing real can be threatened",
        "Real love never ends",
        "Don't wait to start living",
        "Nothing you do can add anything to what you already have",
    ];

    quoteButton.addEventListener("click", function (event) {
        let randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        quoteText.textContent = randomQuote; // Set new quote
        quoteText.classList.add("quoteText"); // Add class for styling

        handImage.style.display = "block"; 
        quoteText.style.display = "block"; 
        
        setTimeout(() => {
            handImage.style.opacity = "1"; 
            quoteText.style.opacity = "1"; 
        }, 10);
        
        event.stopPropagation(); // Prevents immediate fade-out
    });

    // Hide the hand and quote when clicking anywhere else
    document.addEventListener("click", function (event) {
        if (!quoteButton.contains(event.target) && event.target !== handImage && event.target !== quoteText) {
            handImage.style.opacity = "0"; 
            quoteText.style.opacity = "0"; 

            setTimeout(() => {
                handImage.style.display = "none"; 
                quoteText.style.display = "none"; 
            }, 500); // Matches fade-out duration
            }
        });
    });
    
    </script>
</body>
</html>
