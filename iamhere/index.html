<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>i̷̡̡͔̮͛͆͝ ̴̧̨͕̣̞̤̖̤͙̆ǎ̷̫̫̪͈̦͎͔̥̝͌͜ṃ̴̄͝ ̷̙͛̅̿̋̀̑̓h̵͍̤́̋͒̍̚̕ē̸̼̰̊͌̂͊ŗ̵̘̰̺͖̣̆̀͑͋̓̀̄̈́̏è̵̫̙̞̝͂͊͊</title>
    <link rel="icon" type="image/png" href="/faviconnew.png">
    <link href="https://fonts.googleapis.com/css2?family=Xolonium&display=swap" rel="stylesheet" />
    
    <style>
        @font-face {
            font-family: 'Xolonium';
            src: url('/Xolonium.woff2') format('woff2'),
                 url('/Xolonium.woff') format('woff'),
                 url('/Xolonium-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html, body {
            background-color: #fffce6;
            color: #e31982;
            font-family: "Xolonium", sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* FIXED: Changed to absolute slash and removed the space %20 encoding bug */
            background-image: url('/iamherebg.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: default;
        }

        .content-wrapper {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .back-btn {
            position: fixed;   
            top: 20px;         
            left: 20px;        
            color: #3fe304;
            border: 2px solid #3fe304;
            background-color: #fffce6;
            border-radius: 30px;
            padding: 7px 9px;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            z-index: 200;
        }

        .back-btn:hover {
            background-color: #3fe304;
            color: #fffce6;
        }
        
        #bgAnimation {
            position: absolute;
            width: 144px; 
            height: auto;
            top: 78%;
            left: 78%;
            transform: translate(-50%, -50%);
            z-index: 2; 
            pointer-events: none; 
        }
     
        #winkgif {
            position: absolute;
            width: 129px; 
            height: auto;
            top: 43%;
            left: 26%;
            transform: translate(-50%, -50%);
            z-index: 2; 
            pointer-events: none; 
        }
        
        .computer-gif {
            position: absolute; 
            top: 81%; 
            left: 41%; 
            width: 17%; 
            max-width: 1000px; 
            height: auto; 
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        
        #clickmeButton {
            position: absolute;
            top: 91%;
            left: 42%; 
            font-size: 15px;
            padding: 4px 9px;
            color: #E31982;
            font-family: "Xolonium", sans-serif;
            background-color: rgba(128, 113, 121, 0.34);
            cursor: pointer; 
            z-index: 100;
        }

        #clickCount {
            position: absolute;
            top: 56%;
            left: 43%;
            transform: translateX(-50%);
            font-family: "Xolonium", sans-serif;
            color: #e31982;
            font-size: 12px;
            border: 2px double #e31982;
            padding: 5px 15px;
            margin: 0;
            z-index: 100;
            white-space: nowrap;
        }
        
        #facegif {
            position: absolute;
            width: 30vw; 
            top: 20%;  
            right: 473px; 
            transform: translateY(-50%);
            z-index: 1; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
     
        #facegif:active, .Face:active {
            transform: translateY(-50%) scale(0.95); 
        }
     
        #kissface {
            position: absolute;
            width: 785px; 
            left: 77%;
            top: 80%;  
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* Mobile Layouts */
        @media (max-width: 768px) {
            .computer-gif { width: 41vw; left: 25%; top: 87%; }
            #clickmeButton { width: 25vw; left: 17%; top: 93%; font-size: 9px; }
            #clickCount { left: 63%; top: 21%; font-size: 14px; }
            #facegif { width: 58vw; left: 23%; top: 13%; } 
            #winkgif { width: 21vw; left: 29%; top: 22%; } 
            #bgAnimation { width: 40vw; left: 22%; top: 62%; } 
            #kissface { width: 197px; top: 4%; left: 286px; }
        }
     
        .modal {
            display: none; 
            position: fixed;
            z-index: 10000; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 80%;
            max-width: 800px;
            aspect-ratio: 16 / 9; 
            border: 2px solid #e31982; 
            background-color: black;
        }

        .modal-content iframe {
            width: 100%;
            height: 100%;
        }

        .close-video {
            position: absolute;
            top: -40px;
            right: 0;
            color: #e31982;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-video:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <a href="/index.html" class="back-btn">back</a>
        
        <img id="kissface" src="/kissface-ezgif.com-optimize.gif" alt="kissface" class="kiss" />

        <video autoplay loop muted playsinline id="bgAnimation">
            <source src="/alienscreen.webm" type="video/webm">
            Your browser does not support WebM transparency.
        </video>
        
        <video autoplay loop muted playsinline id="winkgif">
            <source src="/winkgif.webm" type="video/webm">
            Your browser does not support WebM transparency.
        </video>
        
        <button id="clickmeButton" onclick="countClicks()">click me</button>
        <p id="clickCount">Clicks: 0</p>
        
        <img src="/computer.gif" alt="Animated Computer" class="computer-gif" />
        
        <div onclick="openVideo()">
            <img id="facegif" src="/facegif-ezgif.com-optipng.png" alt="Face" class="Face" />
        </div>

        <div id="videoModal" class="modal">
            <div class="modal-content">
                <span class="close-video" onclick="closeVideo()">&times;</span>
                <iframe id="youtubePlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
        
    </div>
    
    <script>
const videoList = [
    "73omlAllMm4",  // Video 1
    "JSvcoOCD3IU",  // Video 2
    "0bFbx3fIUoc",  // Video 3
    "JaKcHS27RQU",
    "TUDvI9KDags",
    "QTvFzBS6e68",
    "iDNiLqM90fM",
    "T1gpgU_xkUk",
    "KX7TJrlq8xI",
    "9yPHiSaNmdM",
    "y4C2hk4FuC0"
];

        let count = 0;
        function countClicks() {
            count++;
            document.getElementById("clickCount").innerText = "Clicks: " + count;
        }
                
        function openVideo() {
            const randomIndex = Math.floor(Math.random() * videoList.length);
            const chosenVideoId = videoList[randomIndex];

            document.getElementById("videoModal").style.display = "flex";
            document.getElementById("youtubePlayer").src = `https://www.youtube.com/embed/${chosenVideoId}?autoplay=1`;
        }

        function closeVideo() {
            document.getElementById("videoModal").style.display = "none";
            document.getElementById("youtubePlayer").src = "";
        }
    </script>
</body>
</html>
