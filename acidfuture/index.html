<head>

    <style>
        @font-face {
            font-family: 'Xolonium';
            /* FIXED: Added leading slashes so fonts don't break inside subfolders */
            src: url('/Xolonium.woff2') format('woff2'),
                 url('/Xolonium.woff') format('woff'),
                 url('/Xolonium-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html, body {
            background-color: #ffffcb;
            color: #e31982;
            font-family: "Xolonium", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* FIXED: Added leading slash for background image */
            background-image: url('/scrollbackwords.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: default;
        }
        
        @media (max-width: 768px) {
            html, body {
                background-attachment: scroll; /* Prevents iOS scaling glitches */
                height: 100vh; /* Fallback */
                height: 100dvh; 
            }
        }

.content-wrapper {
            width: 100%;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ff0066;
            border: 2px solid #ff0066;
            background-color: #ffffcb;
            border-radius: 30px;
            padding: 7px 9px;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            z-index: 10000;
        }

        .back-btn:hover {
            background-color: #ff0066;
            color: white;
        }
        
        #phone-gif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 493px; 
            cursor: pointer;
            z-index: 9998;
            background: rgb(255, 255, 220);
            border: 31px solid #ffffcb;
            border-radius: 31px;
            padding: 0;
            transition: transform 0.3s ease-in-out, filter 0.3s ease-in-out;
        }

        #phone-gif video {
            width: 100%;
            display: block;
        }

        #phone-gif.fade-out {
            opacity: 0;
            transform: scale(0.9) translate(-50%, -50%);
            transform-origin: top left;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            #phone-gif { 
                width: 313px; 
                border: 12px solid #ffffcb;
                border-radius: 15px;
                padding: 0;
            }
        }

        /* --- HARMONIZED RETRO PSYCHEDELIC DIALOG BOX --- */
        #video-feed {
            width: 39vw;
            height: 55vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            display: none; 
            flex-direction: column;
            justify-content: flex-start;
            align-content: center;
            
            /* Deep matching neon indigo background sampled from bottom waves */
            background: #ffffe2; 
            
            /* Neon Frame Outline System using hot pink and bright lime green */
            border: 4px solid #808080; 
            outline: 4px solid #808080; 
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.9);
            border-radius: 0px; 
            
            box-sizing: border-box;
            z-index: 2;
            overflow: hidden;
        }

        /* Hot Magenta Header Strip matching top image level */
        .dialog-header {
            width: 100%;
            background: #ff0066;
            color: white;
            font-size: 0.65rem;
            letter-spacing: 2px;
            padding: 6px 10px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 4px solid #808080; /* Lime green accent line divider */
            font-weight: bold;
        }

        /* Electric Yellow blinking selector arrow */
        .dialog-marker {
            animation: retro-blink 1s steps(2, start) infinite;
            color: white;
        }

        @keyframes retro-blink {
            to { visibility: hidden; }
        }

        /* Inner Button container layout area */
        .dialog-body {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 12px;
            padding: 20px 12px;
            overflow-y: auto;
            flex-grow: 1;
            box-sizing: border-box;
        }

        /* Custom Pixel Scrollbars using the Cyan and Magenta themes */
        .dialog-body::-webkit-scrollbar {
            width: 12px;
            background: #2c24b2;
            border-left: 2px solid #beff05;
        }
        .dialog-body::-webkit-scrollbar-thumb {
            background: #03a3ff; /* Electric cyan color strip */
            border: 2px solid #2c24b2;
        }

        @media (max-width: 768px) {
            #video-feed {
                width: 87vw;
                height: 32vh;
                outline: 3px solid #beff05;
                border: 3px solid #ff0066;
            }
            .dialog-header {
                font-size: 0.55rem;
                padding: 4px 8px;
            }
            .dialog-body {
                gap: 10px;
                padding: 12px 6px;
            }
        }

        /* Video Grid Card Thumbs (RETRO 3D CHASSIS EFFECT) */
        .grid-card {
            aspect-ratio: 9 / 16;
            background: #1b1670;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 62px; 

            /* Updated 3D edges using image theme highlights */
            border-top: 3px solid #ffffff;
            border-left: 3px solid #ffffff;
            border-right: 3px solid #808080;
            border-bottom: 3px solid #808080;
            border-radius: 0px; 
            
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.8); 
            
            transform: translate(0, 0);
            transition: border-color 0.1s, transform 0.1s, box-shadow 0.1s;
        }

        @media (max-width: 768px) {
            .grid-card {
                width: 31px;
            }
        }

        .grid-card:hover {
            border-top: 3px solid #808080;
            border-left: 3px solid #808080;
            border-right: 3px solid #ffffff;
            border-bottom: 3px solid #ffffff;
            
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px rgba(0, 0, 0, 0);
        }
        
        .grid-card:active {
            border-color: #beff05; 
        }

        .grid-card .thumb-placeholder {
            font-size: 0.65rem;
            color: #ff60b5;
            padding: 6px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 5px black;
            line-height: 1.2;
        }

        /* --- LIGHTBOX OVERLAY --- */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.78);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .lightbox-content {
            position: relative;
            height: 80vh;
            aspect-ratio: 9 / 16;
            background: #000000;
            
            border-top: 4px solid #ffffff;
            border-left: 4px solid #ffffff;
            border-right: 4px solid #808080;
            border-bottom: 4px solid #808080;
            border-radius: 0px; 
            
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.9);
        }

        @media (max-width: 768px) {
            .lightbox-content { height: 75vh; }
        }

        .lightbox-content video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    
        .grid-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .video-title-overlay {
            position: absolute;
            top: 15px; 
            left: 15px;
            right: 15px;
            font-size: 0.7rem;
            color: #fff;
            background: rgba(0, 0, 0, 0.83);
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
            text-align: left;
            
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 10;
        }

        .lightbox-content:hover .video-title-overlay {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>

    <div id="lightbox" class="lightbox">

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const button = document.getElementById('phone-gif');
        const feed = document.getElementById('video-feed');
        const lightbox = document.getElementById('lightbox');
        const lightboxVideo = document.getElementById('lightbox-video');
        const lightboxTitle = document.getElementById('lightbox-title');
        const closeLightbox = document.getElementById('close-lightbox');

        // Reveal Grid
        if (button && feed) {
            button.addEventListener('click', () => {
                feed.style.display = 'grid'; 
                button.classList.add('fade-out');
                setTimeout(() => {
                    button.style.display = 'none';
                }, 500); 
            });
        }

        // Card Clicks -> Open Lightbox with targeted clip
        document.querySelectorAll('.grid-card').forEach(card => {
            card.addEventListener('click', () => {
                const videoSrc = card.getAttribute('data-src');
                const videoTitle = card.getAttribute('data-title');

                if(videoSrc) {
                    lightboxTitle.textContent = videoTitle || "";
                    lightboxVideo.src = videoSrc;
                    lightbox.style.display = 'flex';
                    lightboxVideo.load();
                    lightboxVideo.play().catch(err => console.log("Autoplay blocked/interrupted"));
                }
            });
        });

        // Close Lightbox Logic safely teardown stream
        const closeBox = () => {
            lightbox.style.display = 'none';
            lightboxVideo.pause();
            lightboxVideo.src = ""; 
        };

        closeLightbox.addEventListener('click', closeBox);
        lightbox.addEventListener('click', (e) => {
            if(e.target === lightbox) closeBox();
        });
    });
</script>
